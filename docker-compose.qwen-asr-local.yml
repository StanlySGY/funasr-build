services:
  qwen-asr-local:
    build:
      context: ./qwen-asr-local
      dockerfile: Dockerfile
    image: qwen-asr-local:latest
    container_name: qwen-asr-local
    network_mode: host
    environment:
      - TZ=Asia/Shanghai
      - QWEN_ASR_MODEL=/models/Qwen3-ASR-0.6B
      - QWEN_ASR_BACKEND=transformers
      - QWEN_ASR_DEVICE=cpu
      - QWEN_ASR_HOST=0.0.0.0
      - QWEN_ASR_PORT=10100
      - HF_HOME=/models/huggingface
      - MODELSCOPE_CACHE=/models/modelscope
    volumes:
      - /data/maas/sgy_arm/qwen-asr-models:/models
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:10100/health',timeout=2).status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3

  funasr-sse-adapter:
    environment:
      - QWEN_ASR_API_STYLE=transcriptions
      - QWEN_ASR_BASE_URL=http://127.0.0.1:10100/v1
      - QWEN_ASR_MODEL=Qwen/Qwen3-ASR-0.6B
      - QWEN_ASR_TIMEOUT_SEC=600
    depends_on:
      - qwen-asr-local
