services:
  sherpa-onnx-asr:
    build:
      context: ./sherpa-onnx-local
      dockerfile: Dockerfile
    image: sherpa-onnx-asr:latest
    container_name: sherpa-onnx-asr
    network_mode: host
    environment:
      - TZ=Asia/Shanghai
      - SHERPA_ONNX_HOST=0.0.0.0
      - SHERPA_ONNX_PORT=10110
      - SHERPA_ONNX_MODEL_DIR=/models
      - SHERPA_ONNX_MODEL_TYPE=paraformer
      - SHERPA_ONNX_PROVIDER=cpu
      - SHERPA_ONNX_NUM_THREADS=4
      - SHERPA_ONNX_SAMPLE_RATE=16000
      - SHERPA_ONNX_FEATURE_DIM=80
      - SHERPA_ONNX_DECODING_METHOD=greedy_search
    volumes:
      - /data/maas/sgy_arm/sherpa-onnx-models:/models
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:10110/health',timeout=2).status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
