services:
  funasr-ws:
    build:
      context: .
      dockerfile: Dockerfile.cpu
    image: funasr-ws-cpu:latest
    container_name: funasr-ws
    ports:
      - "127.0.0.1:10095:10095"
    environment:
      - TZ=Asia/Shanghai
      - PORT=10095
      - DEVICE=cpu
      - NGPU=0
      - NCPU=4
      - MODEL_PATH=/app/funasr-deploy/models/FunAudioLLM/Fun-ASR-Nano-2512
      - MODELSCOPE_CACHE=/app/funasr-deploy/models
    volumes:
      - ./Fun-ASR-Nano-2512-Deploy/models:/app/funasr-deploy/models
      - ./Fun-ASR-Nano-2512-Deploy/asr_logs:/app/funasr-deploy/asr_logs
    restart: unless-stopped

  funasr-sse-adapter:
    build:
      context: ./Fun-ASR-Nano-2512-Deploy
      dockerfile: Dockerfile.sse
    image: funasr-sse-adapter:latest
    container_name: funasr-sse-adapter
    depends_on:
      - funasr-ws
    ports:
      - "10098:10097"
    environment:
      - TZ=Asia/Shanghai
      - HOST=0.0.0.0
      - PORT=10097
      - FUNASR_BACKEND_WS=ws://funasr-ws:10095
    restart: unless-stopped
